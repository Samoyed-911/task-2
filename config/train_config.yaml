model:
  base: "yolov8s-obb"
  
  num_classes: 5

  imgsz: 640

  root: "./data/soda-a"
  
  train_ratio: 0.8
  val_ratio: 0.2
  

  classes:
    - "Ship"
  
  ship_only: true

training:
  epochs: 100

  batch: 16
  u
  optimizer: "AdamW"

  lr0: 0.001
  

  lrf: 0.01
  

  momentum: 0.937
  

  weight_decay: 0.0005
  

  warmup_epochs: 3
  

  warmup_momentum: 0.8
  

  warmup_bias_lr: 0.1
  

  iou: 0.7
  

  conf: 0.001
  
  max_det: 300
  
  amp: true
  workers: 8
  
  resume: false
  
  checkpoint: null
  
  patience: 50
  save_period: 10

# Data Augmentation
augmentation:
  fliplr: 0.5
  
  flipud: 0.5
  
  hsv_h: 0.015
  
  hsv_s: 0.7
  
  hsv_v: 0.4
  
  degrees: 180

  translate: 0.1
  

  scale: 0.5

  shear: 0.0

  perspective: 0.0
  

  mosaic: 1.0

  mixup: 0.0

  copy_paste: 0.0

output:

  project: "outputs/models"
  

  name: "ship_detection"
  

  save: true
  

  plots: true
  
  # Verbose output
  verbose: true

# Device Configuration
device:
  # Device to use: "cpu", "0", "0,1", etc.
  # Use "0" for first GPU, "0,1" for multi-GPU
  gpu: "0"

# Resolution Configuration for PlanetScope 3m adaptation
resolution:
  # SODA-A dataset resolution (meters per pixel)
  # SODA-A uses Google Earth imagery with varying resolution
  # Estimated average resolution: 0.5m - 1.0m per pixel
  source_resolution: 0.8
  
  # Target resolution (PlanetScope)
  target_resolution: 3.0
  
  # Scale factor for inference on 3m imagery
  # Objects will appear smaller in 3m imagery
  scale_factor: 0.267  # 0.8 / 3.0
  
  # Whether to apply resolution adaptation during preprocessing
  adapt_resolution: true
